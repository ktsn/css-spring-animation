name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1
        with:
          node-version: 24
          cache: true

      - name: Format Check
        run: vp run format:check

      - name: Lint
        run: vp run lint

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        run: vp test --run

      - name: Build
        run: vp run build
